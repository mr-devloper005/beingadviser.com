services:
  bd8q2m7x4v:
    container_name: bd8q2m7x4v_app
    image: ghcr.io/mr-devloper005/beingadviser.com:latest
    env_file:
      - .env
    network_mode: bridge
    restart: always
    ports:
      - "127.0.0.1:3048:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 5m
      timeout: 3s
      retries: 2
